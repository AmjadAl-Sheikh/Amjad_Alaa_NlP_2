kind = "web"
previewPath = "/"
title = "المساعد الذكي - بوليتكنك فلسطين"
version = "1.0.0"
id = "artifacts/ppu-assistant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25410

[services.development]
run = "pnpm --filter @workspace/ppu-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ppu-assistant", "run", "build" ]
publicDir = "artifacts/ppu-assistant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25410"
BASE_PATH = "/"
